<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IDLE · proof of soul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* ====================================================================
     IDLE — the board as a living engine.  STANDALONE PROOF.
     Does not touch FloorBoard.html. Pure CSS + rAF physics, zero deps.
     The signature: the combustion stroke — Houston fires, the distance
     collapses. Plus the idle: organic, breathing, alive at rest.
     ==================================================================== */
  :root{
    --ink:#0e0e0d; --ink-soft:#161614; --ink-card:#1b1b18; --ink-rim:#2a2a26;
    --paper:#f5f5f2; --brand-yellow:#ffd400; --brand-rim:#ffd966; --brand-soft:#fff4b0;
    --green-go:#4caf50; --amber:#ffb84d; --red:#ff6b6b;
    --mute:rgba(245,245,242,.55); --mute-soft:rgba(245,245,242,.28); --rule:rgba(255,212,0,.16);
    --heat:0;            /* 0 cold .. 1 redline, driven by JS  */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--ink);color:var(--paper);
    font-family:'Roboto',-apple-system,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}

  /* ── DEPTH: heat lives BEHIND and BELOW, in layers, so the board has
        dimensionality — light emerging from the dark, not a flat filter ── */
  .depth{position:fixed;inset:0;z-index:0;pointer-events:none}
  .heat-low{position:absolute;inset:0;
    background:radial-gradient(120% 80% at 50% 118%,
      rgba(255,150,40,calc(.30*var(--heat))) 0%,
      rgba(255,90,30,calc(.16*var(--heat))) 30%, transparent 62%);
    transition:background .9s ease}
  .heat-cold{position:absolute;inset:0;
    background:radial-gradient(120% 90% at 50% 120%,
      rgba(70,120,200,calc(.22*(1 - var(--heat)))) 0%, transparent 60%);
    transition:background 1.2s ease}
  .grain{position:absolute;inset:0;opacity:.04;mix-blend-mode:overlay;
    background-image:radial-gradient(rgba(255,255,255,.6) .5px,transparent .5px);
    background-size:3px 3px}
  /* combustion flash — fills the room for a breath when the motor fires */
  .flash{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0;
    background:radial-gradient(60% 50% at 50% 42%, rgba(255,235,150,.55), transparent 70%)}
  .flash.fire{animation:flash .5s cubic-bezier(.2,.8,.2,1)}
  @keyframes flash{0%{opacity:0;transform:scale(.96)}12%{opacity:1}100%{opacity:0;transform:scale(1.02)}}

  .stage{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;
    padding:26px 40px 22px;gap:14px}

  /* ── header ── */
  .hdr{display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--rule);padding-bottom:12px}
  .mono{font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    font-size:15px;color:var(--brand-yellow)}
  .mono small{color:var(--mute);font-weight:500;letter-spacing:.18em;margin-left:10px}
  .pulse-dot{display:inline-block;width:9px;height:9px;border-radius:50%;
    background:var(--green-go);margin-right:9px;box-shadow:0 0 10px var(--green-go);
    animation:beat 1.8s ease-in-out infinite;vertical-align:middle}
  @keyframes beat{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.12)}}
  .clock{font-family:'Roboto Mono',monospace;font-size:14px;color:var(--mute)}

  /* ── hero + tachometer ── */
  .core{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    gap:54px;padding:18px 0 6px}
  .tach{position:relative;width:300px;height:300px;flex:0 0 auto}
  .tach svg{position:absolute;inset:0;overflow:visible}
  .needle{transform-origin:150px 150px;transition:none}
  .hero{display:flex;flex-direction:column;align-items:flex-start;min-width:320px}
  .hero .label{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.28em;
    font-size:15px;color:var(--mute);text-transform:uppercase}
  .hero .num{font-family:'Oswald',sans-serif;font-weight:700;line-height:.86;
    font-size:190px;color:var(--paper);
    text-shadow:0 0 calc(40px*var(--heat)) rgba(255,150,40,calc(.7*var(--heat)))}
  .hero .num.pop{animation:pop .6s cubic-bezier(.2,1.4,.3,1)}
  @keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.06)}100%{transform:scale(1)}}
  .hero .split{display:flex;gap:20px;margin-top:6px;font-family:'Roboto Mono',monospace;
    font-size:15px;color:var(--mute)}
  .hero .split b{color:var(--brand-rim);font-weight:700}

  /* ── pick list — the cylinders the power stroke fires through ── */
  .rows{flex:1 1 auto;display:flex;flex-direction:column;gap:9px;overflow:hidden;
    margin-top:4px}
  .row{position:relative;display:flex;align-items:center;gap:18px;
    background:var(--ink-card);border:1px solid var(--ink-rim);border-radius:11px;
    padding:13px 18px;overflow:hidden}
  .row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--brand-yellow);opacity:.28}
  .row.ignite::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,rgba(255,212,0,.42),rgba(255,212,0,0) 38%);
    animation:swipe .55s cubic-bezier(.2,.7,.2,1)}
  @keyframes swipe{0%{transform:translateX(-100%);opacity:0}20%{opacity:1}100%{transform:translateX(40%);opacity:0}}
  .row .loc{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;
    color:var(--brand-yellow);min-width:74px}
  .row .sku{font-family:'Roboto Mono',monospace;font-size:16px;color:var(--paper)}
  .row .nm{font-size:13px;color:var(--mute);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .qty{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;color:var(--mute-soft)}

  /* ── console ── */
  .console{position:fixed;z-index:7;bottom:18px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;background:rgba(20,20,18,.88);
    border:1px solid var(--ink-rim);border-radius:40px;padding:10px 16px;
    backdrop-filter:blur(6px)}
  .btn{font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.1em;cursor:pointer;
    border:none;border-radius:30px;padding:11px 22px;font-size:14px;text-transform:uppercase}
  .btn.fire{background:var(--brand-yellow);color:#1a1a1a}
  .btn.ghost{background:transparent;color:var(--mute);border:1px solid var(--ink-rim)}
  .btn.ghost.on{color:var(--brand-yellow);border-color:var(--brand-rim)}
  .slide{display:flex;align-items:center;gap:8px;color:var(--mute);font-size:12px;
    font-family:'Roboto Mono',monospace}
  input[type=range]{accent-color:var(--brand-yellow);width:120px}
  .hint{position:fixed;top:64px;left:50%;transform:translateX(-50%);color:var(--mute-soft);
    font-size:12px;font-family:'Roboto Mono',monospace;letter-spacing:.05em}

  @media (prefers-reduced-motion: reduce){
    .flash.fire,.hero .num.pop,.row.ignite::after,.pulse-dot{animation:none!important}
  }
</style>
</head>
<body>
  <div class="depth">
    <div class="heat-cold"></div>
    <div class="heat-low"></div>
    <div class="grain"></div>
  </div>
  <div class="flash" id="flash"></div>

  <div class="stage">
    <div class="hdr">
      <div class="mono"><span class="pulse-dot"></span>HQ MOTOR SERVICE<small>FLOOR · IDLE</small></div>
      <div class="clock" id="clock">—</div>
    </div>

    <div class="core">
      <div class="tach">
        <svg viewBox="0 0 300 300">
          <defs>
            <linearGradient id="arcg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#3a6db0"/>
              <stop offset="55%" stop-color="#ffd400"/>
              <stop offset="100%" stop-color="#ff5a2c"/>
            </linearGradient>
          </defs>
          <!-- track -->
          <path d="M 60 240 A 110 110 0 1 1 240 240" fill="none"
                stroke="rgba(255,255,255,.06)" stroke-width="14" stroke-linecap="round"/>
          <!-- live sweep (dasharray driven by JS) -->
          <path id="sweep" d="M 60 240 A 110 110 0 1 1 240 240" fill="none"
                stroke="url(#arcg)" stroke-width="14" stroke-linecap="round"
                stroke-dasharray="0 999"/>
          <!-- redline ticks -->
          <g id="ticks"></g>
          <!-- needle -->
          <g class="needle" id="needle">
            <line x1="150" y1="150" x2="150" y2="58" stroke="var(--brand-rim)" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="150" cy="150" r="11" fill="#1b1b18" stroke="var(--brand-rim)" stroke-width="2.5"/>
            <circle cx="150" cy="150" r="3.5" fill="var(--brand-yellow)"/>
          </g>
        </svg>
      </div>

      <div class="hero">
        <div class="label">Orders to grab</div>
        <div class="num" id="num">0</div>
        <div class="split"><span>eBay <b id="eb">0</b></span><span>Direct <b id="di">0</b></span><span id="state">idling</span></div>
      </div>
    </div>

    <div class="rows" id="rows"></div>
  </div>

  <div class="hint">tap <b>FIRE</b> — an order lands in Houston · feel it on your desk</div>

  <div class="console">
    <button class="btn fire" id="fire">⚡ Fire order</button>
    <button class="btn ghost" id="auto">Auto</button>
    <div class="slide">LOAD<input type="range" id="load" min="0" max="100" value="22"></div>
    <button class="btn ghost" id="sound">♪ Sound</button>
  </div>

<script>
/* ─────────────────────────────────────────────────────────────────────
   THE ENGINE.  rpm has mass: a spring integrator with overshoot + an
   organic idle float (summed sines, random phase) so it never sits dead.
   ───────────────────────────────────────────────────────────────────── */
const $=s=>document.querySelector(s);
const sweep=$('#sweep'), needle=$('#needle'), numEl=$('#num'), root=document.documentElement;
const ARC_LEN=518;            /* ~ path length of the 270° arc            */
const A0=-135, A1=135;        /* needle angle range (deg)                 */

let load=22;                  /* 0..100 baseline from the floor (slider)  */
let rpm=22, vel=0;            /* spring state                             */
let blip=0;                   /* transient combustion kick, decays        */
let heat=0;                   /* 0..1 rendered temperature                */
let shown=0;                  /* odometer-eased hero number               */
let count=0, eb=0, di=0;
const phases=[Math.random()*7,Math.random()*7,Math.random()*7];

/* redline ticks */
(function(){const g=$('#ticks');for(let i=0;i<=10;i++){
  const a=(A0+(A1-A0)*i/10)*Math.PI/180, r1=128,r2=i>=8?140:135;
  const x1=150+r1*Math.sin(a),y1=150-r1*Math.cos(a),x2=150+r2*Math.sin(a),y2=150-r2*Math.cos(a);
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',i>=8?'#ff5a2c':'rgba(255,255,255,.22)');l.setAttribute('stroke-width',i>=8?3:2);
  g.appendChild(l);}})();

let last=performance.now();
function frame(now){
  const dt=Math.min(.05,(now-last)/1000); last=now;
  const t=now/1000;

  /* organic idle float — life lives in the imperfection */
  const float=(Math.sin(t*1.3+phases[0])+Math.sin(t*2.7+phases[1])*.5+Math.sin(t*5.1+phases[2])*.25);
  const target=load + blip + float*(1.1+load*0.02);

  /* spring with mass → overshoot + settle */
  const stiff=120, damp=13;
  const a=stiff*(target-rpm)-damp*vel; vel+=a*dt; rpm+=vel*dt;
  blip*=Math.pow(.0001,dt);                 /* fast decay of the kick */

  /* heat eases toward load (+ combustion surge already folded via blip) */
  const heatTarget=Math.min(1,(load/100)*1.05 + blip*0.012);
  heat+=(heatTarget-heat)*Math.min(1,dt*2.2);
  root.style.setProperty('--heat',heat.toFixed(3));

  /* render needle + sweep */
  const frac=Math.max(0,Math.min(1,rpm/100));
  needle.setAttribute('transform',`rotate(${A0+(A1-A0)*frac} 150 150)`);
  sweep.setAttribute('stroke-dasharray',`${ARC_LEN*frac} 999`);

  /* hero number eases to the true count (odometer feel) */
  shown+=(count-shown)*Math.min(1,dt*6);
  numEl.textContent=Math.round(shown);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ─────────── the rows (cylinders) ─────────── */
const SEED=[
  ['A-12','165447','Cylinder head gasket set',2],
  ['B-07','215153','Engine repair kit 0.50',1],
  ['C-31','176688','Oil pump assembly',1],
  ['A-44','162198','Full gasket set 1G790',3],
  ['D-09','155394','Crankshaft main bearing',1],
  ['K-02','217871','Overhaul kit — major',1],
];
const rowsEl=$('#rows');
function paintRows(){rowsEl.innerHTML='';SEED.forEach(r=>{
  const d=document.createElement('div');d.className='row';
  d.innerHTML=`<span class="loc">${r[0]}</span><span class="sku">${r[1]}</span>
    <span class="nm">${r[2]}</span><span class="qty">×${r[3]}</span>`;
  rowsEl.appendChild(d);});}
paintRows();

/* ─────────── THE COMBUSTION STROKE ─────────── */
function fire(){
  count++; (Math.random()<.6?eb++:di++);
  $('#eb').textContent=eb; $('#di').textContent=di; $('#state').textContent='live';

  blip+=34;                                   /* the throttle kick     */
  $('#flash').classList.remove('fire'); void $('#flash').offsetWidth; $('#flash').classList.add('fire');
  numEl.classList.remove('pop'); void numEl.offsetWidth; numEl.classList.add('pop');

  /* the power stroke travels down the cylinders, one beat apart */
  const rows=[...document.querySelectorAll('.row')];
  rows.forEach((r,i)=>setTimeout(()=>{
    r.classList.remove('ignite'); void r.offsetWidth; r.classList.add('ignite');
  }, 60+i*70));

  combustionNote();
}

/* ─────────── sound: one low combustion note, tuned, off by default ─────────── */
let actx=null, soundOn=false;
function combustionNote(){
  if(!soundOn||!actx) return;
  const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain(), lp=actx.createBiquadFilter();
  o.type='sawtooth'; o.frequency.setValueAtTime(70,t); o.frequency.exponentialRampToValueAtTime(48,t+.18);
  lp.type='lowpass'; lp.frequency.setValueAtTime(420,t); lp.frequency.exponentialRampToValueAtTime(140,t+.2);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.5,t+.012); g.gain.exponentialRampToValueAtTime(.001,t+.42);
  o.connect(lp); lp.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+.45);
}

/* ─────────── console wiring ─────────── */
$('#fire').onclick=fire;
$('#load').oninput=e=>{load=+e.target.value;};
let autoTimer=null;
$('#auto').onclick=e=>{
  const on=e.target.classList.toggle('on'); e.target.textContent=on?'Auto ✓':'Auto';
  if(on){const tick=()=>{fire();autoTimer=setTimeout(tick,2600+Math.random()*4200);};autoTimer=setTimeout(tick,1500);}
  else{clearTimeout(autoTimer);autoTimer=null;}
};
$('#sound').onclick=e=>{
  if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  actx.resume(); soundOn=e.target.classList.toggle('on'); e.target.textContent=soundOn?'♪ Sound ✓':'♪ Sound';
};

/* clock — Houston */
function clk(){const o={timeZone:'America/Chicago',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true};
  $('#clock').textContent='HOUSTON · '+new Intl.DateTimeFormat('en-US',o).format(new Date());}
clk(); setInterval(clk,1000);
</script>
</body>
</html>
